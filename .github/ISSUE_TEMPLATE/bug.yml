name: Bug report

description: Report a reproducible DramaDev issue.
title: "[Bug]: "
labels:
  - "type: bug"
  - "status: needs-triage"
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Click...\n3. See..."
    validations:
      required: true
  - type: input
    id: route
    attributes:
      label: Route or screen
      placeholder: /variant-b
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshots, logs, or acceptance command output.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This report can be addressed without backend/API route, payment, auth, database, Facebook/analytics, secret, or release-infra changes.
          required: true
