name: Sanity check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - acceptance/**
      - docs/**
      - .github/workflows/sanity-check.yml

permissions:
  contents: read

concurrency:
  group: sanity-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    name: static repository sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run acceptance smoke script
        run: bash acceptance/dramadev-p0.sh --ci
