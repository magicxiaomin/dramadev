name: PR checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    name: lint, unit, build, and hard-stop checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Deterministic hard-stop checks
        run: node .github/scripts/review-gate-checks.mjs
      - name: Banned dependency check
        run: pnpm check:banned-deps
      - name: Unit tests
        run: pnpm test:unit
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
